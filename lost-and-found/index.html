<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鯖心メトロ - Sabakokoro Metro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>
    <link rel="stylesheet" href="https://nestaida4096.github.io/Sabakokoro-Metro-Repo/style.css">
    
    <link rel="stylesheet" href="https://nestaida4096.github.io/Sabakokoro-Metro-Repo//cdnjs.cloudflare.com/ajax/libs/highlight.js/11.5.1/styles/default.min.css">
    <script src="https://nestaida4096.github.io/Sabakokoro-Metro-Repo//cdnjs.cloudflare.com/ajax/libs/highlight.js/11.5.1/highlight.min.js"></script>
</head>
<body class="bg-white flex flex-col min-h-screen">

    <div id="header"></div>

    <!-- メインコンテンツ -->
    <main class="flex-grow">
        <!-- コンテンツエリア -->
        <div class="w-full px-6 lg:px-24 py-12 bg-white">
            <div class="max-w-[1400px] mx-auto">
                <article id="markdown-content">
                    <!-- Markdown Content Loaded Here -->
                </article>
            </div>
        </div>
    </main>

    <div id="footer"></div>

    <script>
        $(function(){
            $("#head").load("https://nestaida4096.github.io/Sabakokoro-Metro-Repo/head.html");
        });
        $(function(){
            $("#header").load("https://nestaida4096.github.io/Sabakokoro-Metro-Repo/header.html");
        });
        $(function(){
            $("#footer").load("https://nestaida4096.github.io/Sabakokoro-Metro-Repo/footer.html");
        });
    </script>

    <script>
        const markdownSource = `
> このページに存在するリンクは、現在使用できません。<br>詳しくは、MTTS管理者までお問い合わせいただきますようお願いいたします。
## お忘れ物検索の方法
- お忘れ物を検索するには、MTTSゲームサーバーに接続してから[こちら](http://localhost:9000/lost-and-found)をクリックしてください。
- MTTS共通のお忘れ物検索ページへ移動します。
- ページの移動後、会社を選択してから、お忘れ物の特徴を入力して検索してください。
- お忘れ物の特徴には、色、形、サイズ、ブランドなどを入力していただくと、スムーズに検索できます。
- 検索結果には、該当するお忘れ物のリストが表示されます。リストには、お忘れ物の写真、特徴、発見された場所、発見された日時などの情報が含まれています。
- お忘れ物が見つかった場合は、リストに表示される連絡先情報を使用して、発見されたお忘れ物の引き取り方法や手続きを確認してください。
        `;

        document.addEventListener('DOMContentLoaded', () => {
            const contentArea = document.getElementById('markdown-content');

            const html = marked.parse(markdownSource);

            const container = document.createElement("div");
            container.innerHTML = html;

            const types = {
                "[!WARNING]": "warning",
                "[!NOTE]": "note",
                "[!TIP]": "tip",
                "[!IMPORTANT]": "important"
            };

            container.querySelectorAll("blockquote").forEach(el => {
                const text = el.textContent.trim();

                for (const key in types) {
                    if (text.startsWith(key)) {
                        el.classList.add("alert", types[key]);
                        el.innerHTML = el.innerHTML.replace(key, "");
                    }
                }
            });

            contentArea.innerHTML = container.innerHTML;
        });

        new Swiper('.myCarousel', {
            loop: true,
            centeredSlides: true,
            spaceBetween: 20,
            slidesPerView: 1,

            navigation: {
                nextEl: '.swiper-button-next',
                prevEl: '.swiper-button-prev',
            },

            pagination: {
                el: '.swiper-pagination',
                clickable: true,
            },

            breakpoints: {
                768: { slidesPerView: 2 },
                1024: { slidesPerView: 3 }
            }
        });
    </script>
</body>
</html>
