    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>
    <script>
    $(async function(){

        // ① titles.jsonを取得
        let titles = await $.getJSON("/titles.json");

        // ② 現在のパスからキーを決定
        let path = location.pathname;

        // 例: "/about.html" → "about"
        let key = path.replace(".html","");

        // ③ タイトル取得
        let title = titles[key] || "";
        if (title !== "") {
            title += "｜";
        }

        // ④ head.html取得
        let data = await $.get("/head.html");

        // ⑤ タイトル置換
        data = data.replace("%{title}%", title);

        // ⑥ 追加
        $("head").append(data);

        // ⑦ script再実行（必要最低限にする）
        $(data).filter("script[src]").each(function(){
            let s = document.createElement("script");
            s.src = this.src;
            document.head.appendChild(s);
        });

    });
    </script>
</head>

    <script>
        const markdownSource = `
> このページの内容の一部は、設定上のものです。実際には利用・購入できない場合があります。
## 駅ナカ店舗
- 鯖心メトロの駅ナカ店舗は、地域の特色を活かした多彩な店舗が揃っています。各駅の店舗情報は以下の通りです。
### 新城駅
- フリーテナントスペース「えきしたひろば」：えきしたひろばは、新城駅の改札内にあるフリーテナントスペースです。地元の飲食店や雑貨店が期間限定で出店し、駅利用者に新しい発見と楽しみを提供しています。
### 西鯖心駅
- 総合地下商店街「サバチカ　西鯖心」：サバチカは、西鯖心駅の地下に広がる総合商店街です。飲食店、ファッション、雑貨、サービスなど多彩な店舗が軒を連ね、駅利用者や地域住民にとって便利で魅力的なショッピングスポットとなっています。
        `;

        document.addEventListener('DOMContentLoaded', () => {
            const contentArea = document.getElementById('markdown-content');

            const html = marked.parse(markdownSource);

            const container = document.createElement("div");
            container.innerHTML = html;

            const types = {
                "[!WARNING]": "warning",
                "[!NOTE]": "note",
                "[!TIP]": "tip",
                "[!IMPORTANT]": "important"
            };

            container.querySelectorAll("blockquote").forEach(el => {
                const text = el.textContent.trim();

                for (const key in types) {
                    if (text.startsWith(key)) {
                        el.classList.add("alert", types[key]);
                        el.innerHTML = el.innerHTML.replace(key, "");
                    }
                }
            });

            contentArea.innerHTML = container.innerHTML;
        });

        window.addEventListener('load', () => {
        new Swiper('.myCarousel', {
            loop: true,
            centeredSlides: true,
            spaceBetween: 20,
            slidesPerView: 1,

            autoplay: {
            delay: 3000, // 3秒ごと
            disableOnInteraction: false, // ユーザー操作後も継続
            pauseOnMouseEnter: true,
            },

            navigation: {
                nextEl: '.swiper-button-next',
                prevEl: '.swiper-button-prev',
            },

            pagination: {
                el: '.swiper-pagination',
                clickable: true,
            },

            breakpoints: {
                768: { slidesPerView: 2 },
                1024: { slidesPerView: 3 }
            }
        });
        });
    </script>
