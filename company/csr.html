<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>
    <script>
    $(async function(){

        // ① titles.jsonを取得
        let titles = await $.getJSON("/titles.json");

        // ② 現在のパスからキーを決定
        let path = location.pathname;

        // 例: "/about.html" → "about"
        let key = path.replace(".html","");

        // ③ タイトル取得
        let title = titles[key] || "";
        if (title !== "") {
            title += "｜";
        }

        // ④ head.html取得
        let data = await $.get("/head.html");

        // ⑤ タイトル置換
        data = data.replace("%{title}%", title);

        // ⑥ 追加
        $("head").append(data);

        // ⑦ script再実行（必要最低限にする）
        $(data).filter("script[src]").each(function(){
            let s = document.createElement("script");
            s.src = this.src;
            document.head.appendChild(s);
        });

    });
    </script>
</head>
<body class="bg-white flex flex-col min-h-screen">

    <div id="header"></div>

    <!-- メインコンテンツ -->
    <main class="flex-grow">
        <!-- コンテンツエリア -->
        <div class="w-full px-6 lg:px-24 py-12 bg-white">
            <div class="max-w-[1400px] mx-auto">
                <article id="markdown-content">
                    <!-- Markdown Content Loaded Here -->
                </article>
            </div>
        </div>
    </main>

    <div id="footer"></div>

    <script>
        $(function () {
            $("#header").load("/header.html");
        });
        $(function () {
            $("#footer").load("/footer.html");
        });
    </script>


    <script>
        const markdownSource = `
> このページの内容の一部は、設定上のものです。<br>ゲーム内において、環境保全という概念はほぼありません。
## CSR・環境への取り組み
鯖心メトロは、地域社会と環境への責任を重視し、持続可能な都市交通の実現に向けた取り組みを積極的に推進しています。
### 環境への取り組み
- **再生可能エネルギーの利用**：全ての駅と車両で再生可能エネルギーを使用し、CO2排出量の削減に努めています。
- **エネルギー効率の向上**：最新の省エネルギー技術を導入し、車両のエネルギー効率を最大化しています。
- **廃棄物の削減**：リサイクルプログラムを実施し、駅や車両で発生する廃棄物の削減に取り組んでいます。
### 社会貢献活動
- **地域イベントの支援**：地元の文化イベントやスポーツイベントを積極的に支援し、地域社会とのつながりを深めています。
- **教育プログラムの提供**：学校やコミュニティセンターで、交通安全や環境保護に関する教育プログラムを提供しています。
- **障害者支援**：障害者向けのサービスを提供し、全ての人が快適に利用できる交通環境の実現を目指しています。
        `;

        document.addEventListener('DOMContentLoaded', () => {
            const contentArea = document.getElementById('markdown-content');

            const html = marked.parse(markdownSource);

            const container = document.createElement("div");
            container.innerHTML = html;

            const types = {
                "[!WARNING]": "warning",
                "[!NOTE]": "note",
                "[!TIP]": "tip",
                "[!IMPORTANT]": "important"
            };

            container.querySelectorAll("blockquote").forEach(el => {
                const text = el.textContent.trim();

                for (const key in types) {
                    if (text.startsWith(key)) {
                        el.classList.add("alert", types[key]);
                        el.innerHTML = el.innerHTML.replace(key, "");
                    }
                }
            });

            contentArea.innerHTML = container.innerHTML;
        });

        new Swiper('.myCarousel', {
            loop: true,
            centeredSlides: true,
            spaceBetween: 20,
            slidesPerView: 1,

            navigation: {
                nextEl: '.swiper-button-next',
                prevEl: '.swiper-button-prev',
            },

            pagination: {
                el: '.swiper-pagination',
                clickable: true,
            },

            breakpoints: {
                768: { slidesPerView: 2 },
                1024: { slidesPerView: 3 }
            }
        });
    </script>
</body>
</html>
