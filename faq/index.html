<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>
    <script>
    $(async function(){

        // ① titles.jsonを取得
        let titles = await $.getJSON("https://nestaida4096.github.io/Sabakokoro-Metro-Repo/titles.json");

        // ② 現在のパスからキーを決定
        let path = location.pathname;

        // 例: "https://nestaida4096.github.io/Sabakokoro-Metro-Repo/about.html" → "about"
        let key = path.replace(".html","");

        // ③ タイトル取得
        let title = titles[key] || "";
        if (title !== "") {
            title += "｜";
        }

        // ④ head.html取得
        let data = await $.get("https://nestaida4096.github.io/Sabakokoro-Metro-Repo/head.html");

        // ⑤ タイトル置換
        data = data.replace("%{title}%", title);

        // ⑥ 追加
        $("head").append(data);

        // ⑦ script再実行（必要最低限にする）
        $(data).filter("script[src]").each(function(){
            let s = document.createElement("script");
            s.src = this.src;
            document.head.appendChild(s);
        });

    });
    </script>
</head>
<body class="bg-white flex flex-col min-h-screen">

    <div id="header"></div>

    <!-- メインコンテンツ -->
    <main class="flex-grow">
        <!-- コンテンツエリア -->
        <div class="w-full px-6 lg:px-24 py-12 bg-white">
            <div class="max-w-[1400px] mx-auto">
                <article id="markdown-content">
                    <!-- Markdown Content Loaded Here -->
                </article>
            </div>
        </div>
    </main>

    <div id="footer"></div>

    <script>
        $(function(){
            $("#head").load("https://nestaida4096.github.io/Sabakokoro-Metro-Repo/head.html");
        });
        $(function(){
            $("#header").load("https://nestaida4096.github.io/Sabakokoro-Metro-Repo/header.html");
        });
        $(function(){
            $("#footer").load("https://nestaida4096.github.io/Sabakokoro-Metro-Repo/footer.html");
        });
    </script>

    <script>
        const markdownSource = `
## よくある質問
鯖心メトロに関するよくある質問とその回答をまとめました。ご不明な点がある場合は、以下の質問と回答をご確認ください。
### 切符の購入方法は？
各駅の自動券売機で切符を購入できます。ICカードのチャージも同様に自動券売機で行えます。定期券の購入は、お問い合わせセンターへのメール送信によって行います。
### 定期券の購入方法は？
定期券は、お問い合わせセンターへのメール送信によって購入いただきます。
### 会社の採用情報はどこで確認できますか？
会社の採用情報は、[こちら](/careers)からご確認いただけます。
### お忘れ物の検索方法は？
お忘れ物の検索は、[こちら](/lost-and-found)から行えます。
### 安全への取り組みはどのようなものがありますか？
鯖心メトロでは、安全への取り組みとして、定期的な安全訓練の実施、最新の安全技術の導入、そしてお客様への安全啓発活動を行っています。詳細は[こちら](/faq/safety.html)をご覧ください。
        `;

        document.addEventListener('DOMContentLoaded', () => {
            const contentArea = document.getElementById('markdown-content');

            const html = marked.parse(markdownSource);

            const container = document.createElement("div");
            container.innerHTML = html;

            const types = {
                "[!WARNING]": "warning",
                "[!NOTE]": "note",
                "[!TIP]": "tip",
                "[!IMPORTANT]": "important"
            };

            container.querySelectorAll("blockquote").forEach(el => {
                const text = el.textContent.trim();

                for (const key in types) {
                    if (text.startsWith(key)) {
                        el.classList.add("alert", types[key]);
                        el.innerHTML = el.innerHTML.replace(key, "");
                    }
                }
            });

            contentArea.innerHTML = container.innerHTML;
        });

        new Swiper('.myCarousel', {
            loop: true,
            centeredSlides: true,
            spaceBetween: 20,
            slidesPerView: 1,

            navigation: {
                nextEl: '.swiper-button-next',
                prevEl: '.swiper-button-prev',
            },

            pagination: {
                el: '.swiper-pagination',
                clickable: true,
            },

            breakpoints: {
                768: { slidesPerView: 2 },
                1024: { slidesPerView: 3 }
            }
        });
    </script>
</body>
</html>
